name: Publish runtime manifest

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sign manifest
        env:
          LILBUD_RUNTIME_MANIFEST_PRIVATE_KEY: ${{ secrets.LILBUD_RUNTIME_MANIFEST_PRIVATE_KEY }}
        run: swift Scripts/sign_runtime_manifest.swift RuntimeManifest/manifest.json RuntimeManifest/manifest.sig
      - name: Create stable release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view runtime-manifest-stable || gh release create runtime-manifest-stable --title "Lilbud runtime manifest" --notes "Signed runtime manifest used by Lilbud."
      - name: Upload signed manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload runtime-manifest-stable RuntimeManifest/manifest.json RuntimeManifest/manifest.sig --clobber
